<script>
  /* ── Custom Cursor ── */
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    document.body.style.cursor = 'none';
    if (rx === 0 && ry === 0) { rx = mx; ry = my; }
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width='54px'; ring.style.height='54px'; ring.style.borderColor='rgba(217,70,168,0.8)'; });
    el.addEventListener('mouseleave', () => { ring.style.width='38px'; ring.style.height='38px'; ring.style.borderColor='rgba(155,77,255,0.55)'; });
  });
  (function animateCursor() {
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    rx += (mx - rx) * 0.13; ry += (my - ry) * 0.13;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  })();
 
  /* ── Hex Grid Background Animation ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, hexes = [];
  const SIZE = 42;
  const mouse = { x: -999, y: -999 };
 
  document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
 
  function hexCorner(cx, cy, s, i) {
    const angle = Math.PI / 180 * (60 * i - 30);
    return { x: cx + s * Math.cos(angle), y: cy + s * Math.sin(angle) };
  }
 
  function buildGrid() {
    hexes = [];
    const w = SIZE * Math.sqrt(3);
    const h = SIZE * 2;
    const cols = Math.ceil(W / w) + 2;
    const rows = Math.ceil(H / (h * 0.75)) + 2;
    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        const cx = col * w + (row % 2 === 0 ? 0 : w / 2);
        const cy = row * h * 0.75;
        hexes.push({ cx, cy, phase: Math.random() * Math.PI * 2, speed: 0.006 + Math.random() * 0.008, baseAlpha: Math.random() * 0.06 + 0.03 });
      }
    }
  }
 
  function resizeBg() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resizeBg(); buildGrid();
  window.addEventListener('resize', () => { resizeBg(); buildGrid(); });
 
  /* Auto ripples */
  const ripples = [];
  function spawnRipple(x, y) {
    ripples.push({
      x: x != null ? x : Math.random() * W,
      y: y != null ? y : Math.random() * H,
      r: 0,
      maxR: 240 + Math.random() * 160,
      speed: 2 + Math.random(),
      color: Math.random() < 0.5 ? '155,77,255' : '217,70,168'
    });
  }
  setInterval(() => spawnRipple(), 1600);
  spawnRipple(); spawnRipple(window.innerWidth * 0.5, window.innerHeight * 0.5);
 
  /* Click = ripple at cursor */
  document.addEventListener('click', () => spawnRipple(mouse.x, mouse.y));
 
  /* Floating particles drifting upward */
  const floaters = Array.from({ length: 55 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vy: -(0.25 + Math.random() * 0.45),
    vx: (Math.random() - 0.5) * 0.15,
    alpha: Math.random() * 0.35 + 0.08,
    size: Math.random() * 1.8 + 0.4,
    col: Math.random() < 0.6 ? '155,77,255' : Math.random() < 0.5 ? '217,70,168' : '156,163,175',
  }));
 
  function drawHex(cx, cy, s) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const p = hexCorner(cx, cy, s, i);
      i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
  }
 
  function bgLoop() {
    ctx.clearRect(0, 0, W, H);
 
    /* Update & cull ripples */
    for (let k = ripples.length - 1; k >= 0; k--) {
      ripples[k].r += ripples[k].speed;
      if (ripples[k].r > ripples[k].maxR) ripples.splice(k, 1);
    }
 
    /* Hex cells */
    hexes.forEach(h => {
      h.phase += h.speed;
      const pulse = Math.sin(h.phase) * 0.5 + 0.5;
 
      const mdx = mouse.x - h.cx, mdy = mouse.y - h.cy;
      const md  = Math.sqrt(mdx * mdx + mdy * mdy);
      const mouseInfluence = Math.max(0, 1 - md / 160);
 
      let rippleInfluence = 0, rippleColor = '155,77,255';
      ripples.forEach(rip => {
        const rdx = rip.x - h.cx, rdy = rip.y - h.cy;
        const rd   = Math.sqrt(rdx * rdx + rdy * rdy);
        const ring = Math.abs(rd - rip.r);
        const inf  = ring < 30 ? (1 - ring / 30) * (1 - rip.r / rip.maxR) : 0;
        if (inf > rippleInfluence) { rippleInfluence = inf; rippleColor = rip.color; }
      });
 
      const alpha = h.baseAlpha + pulse * 0.05 + mouseInfluence * 0.35 + rippleInfluence * 0.45;
      const strokeCol = mouseInfluence > 0.25
        ? `rgba(217,70,168,${alpha})`
        : rippleInfluence > 0.08
          ? `rgba(${rippleColor},${alpha})`
          : `rgba(155,77,255,${alpha})`;
 
      if (mouseInfluence > 0.35 || rippleInfluence > 0.25) {
        drawHex(h.cx, h.cy, SIZE - 1);
        const fillA = mouseInfluence * 0.12 + rippleInfluence * 0.15;
        const col   = mouseInfluence > 0.35 ? '217,70,168' : rippleColor;
        ctx.fillStyle = `rgba(${col},${fillA})`;
        ctx.fill();
      }
 
      drawHex(h.cx, h.cy, SIZE - 1);
      ctx.strokeStyle = strokeCol;
      ctx.lineWidth   = mouseInfluence > 0.5 ? 1.2 : 0.8;
      ctx.stroke();
    });
 
    /* Floating particles */
    floaters.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      if (p.x < 0 || p.x > W) p.vx *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${p.alpha})`;
      ctx.fill();
    });
 
    /* Cursor canvas glow */
    if (mouse.x > 0) {
      const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 130);
      mg.addColorStop(0, 'rgba(217,70,168,0.07)');
      mg.addColorStop(1, 'rgba(217,70,168,0)');
      ctx.fillStyle = mg;
      ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 130, 0, Math.PI * 2); ctx.fill();
    }
 
    requestAnimationFrame(bgLoop);
  }
  /* ── Hobby Lightbox ── */
  const hobbyData = {
    travelling: {
      title: '✈️ Travelling',
      caption: 'A glimpse into my adventures — each trip a new perspective and a new story. Add your travel photos here.',
      images: [
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
      ]
    },
    yoga: {
      title: '🧘 Yoga & Mindfulness',
      caption: 'My daily practice — a few quiet moments that make everything else sharper. Add your yoga photos here.',
      images: [
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
      ]
    },
    cooking: {
      title: '🍳 Cooking',
      caption: 'Experimenting with global cuisines — one recipe at a time. Add your food photos here.',
      images: [
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
        { src: '', label: 'Add photo' },
      ]
    }
  };
 
  function openHobby(id) {
    const d = hobbyData[id];
    document.getElementById('hb-title').textContent = d.title;
    document.getElementById('hb-caption').textContent = d.caption;
    const grid = document.getElementById('hb-grid');
    grid.innerHTML = d.images.map(img =>
      img.src
        ? `<div class="hobby-img-slot"><img src="${img.src}" alt="${d.title}"/></div>`
        : `<div class="hobby-img-slot empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>${img.label}</span></div>`
    ).join('');
    document.getElementById('hobbyLightbox').classList.add('open');
  }
 
  function closeHobby() {
    document.getElementById('hobbyLightbox').classList.remove('open');
  }
 
  document.getElementById('hobbyLightbox').addEventListener('click', function(e) {
    if (e.target === this) closeHobby();
  });
 
  /* ── Certifications Modal ── */
  const certModal    = document.getElementById('certModal');
  const certShowMore = document.getElementById('certShowMore');
  const certClose    = document.getElementById('certModalClose');
  certShowMore.addEventListener('click', () => certModal.classList.add('open'));
  certClose.addEventListener('click',    () => certModal.classList.remove('open'));
  certModal.addEventListener('click', e => { if (e.target === certModal) certModal.classList.remove('open'); });
 
</script>
